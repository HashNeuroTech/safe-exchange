
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: exchange_pass
      POSTGRES_DB: exchange_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  web-next:
    build:
      context: ./web-next
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://exchange:exchange_pass@postgres:5432/exchange_db?sslmode=disable
      REDIS_ADDR: redis:6379

volumes:
  pgdata:
